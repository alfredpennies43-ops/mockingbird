<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1200, initial-scale=1" />
  <title>Lucidbloom — Cover</title>
  <link rel="stylesheet" href="../css/system.css" />
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css" />
  <style>
    html, body {
      width: 1200px;
      height: 800px;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    body { background: var(--lb-void); }
    body::before { z-index: 1; }

    .artboard {
      position: relative;
      width: 1200px;
      height: 800px;
      overflow: hidden;
      isolation: isolate;
      background: var(--lb-void);
      padding: 80px 80px;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 60px;
      align-items: center;
      z-index: 2;
    }

    /* ===== LEFT: identity column ===== */
    .id-col {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .wordmark {
      font-family: var(--lb-font-display);
      font-size: 168px;
      line-height: 0.86;
      letter-spacing: -0.03em;
      color: var(--lb-ink);
      margin: 0;
    }
    .wordmark .bloom {
      color: var(--lb-magenta);
    }

    .concept {
      font-family: var(--lb-font-body);
      font-size: 19px;
      line-height: 1.45;
      color: var(--lb-mist);
      max-width: 28ch;
      margin: 0;
      font-weight: 400;
    }
    .concept b {
      color: var(--lb-citrine);
      font-weight: 600;
    }

    /* Palette swatch row */
    .palette {
      display: flex;
      gap: 0;
      border-radius: 999px;
      overflow: hidden;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 18px 36px -16px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08);
      height: 22px;
    }
    .palette span {
      flex: 1;
    }

    /* ===== RIGHT: imagery column ===== */
    .vis-col {
      position: relative;
      z-index: 2;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .stage__eye {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 64% 36% 58% 42% / 48% 60% 40% 52%;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 43, 177, 0.4),
        0 60px 120px -30px rgba(0, 0, 0, 0.7),
        0 0 120px -20px rgba(255, 43, 177, 0.35);
    }
    .stage__eye img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .stage__badge {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(14, 3, 34, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 36px -16px rgba(0, 0, 0, 0.7);
      font-family: var(--lb-font-body);
      font-size: 13px;
      color: var(--lb-ink);
      font-weight: 500;
      z-index: 4;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .stage__badge i { color: var(--lb-citrine); font-size: 15px; }
    .stage__badge b {
      color: var(--lb-citrine);
      font-family: var(--lb-font-display);
      font-weight: 400;
      font-size: 15px;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <div class="artboard">
    <!-- ===== Identity column ===== -->
    <div class="id-col">
      <h1 class="wordmark">Lucid<br><span class="bloom">bloom</span></h1>

      <p class="concept">A psychedelic dark system. Ink dropped in <b>violet water</b>.</p>

      <div class="palette" aria-hidden="true">
        <span style="background: #0E0322;"></span>
        <span style="background: #1F0A4A;"></span>
        <span style="background: #7E3BFF;"></span>
        <span style="background: #FF2BB1;"></span>
        <span style="background: #FF8A2A;"></span>
        <span style="background: #FFD23F;"></span>
        <span style="background: #29E5C9;"></span>
        <span style="background: #FBF5FF;"></span>
      </div>
    </div>

    <!-- ===== Imagery column ===== -->
    <div class="vis-col">
      <div class="stage__eye">
        <img src="../images/eye.png" alt="" />
      </div>
    </div>
  </div>
</body>
</html>
